<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 24px;
            background: #f7f7f7;
            color: #222;
        }

        h1 {
            margin-bottom: 12px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
        }

        iframe {
            width: 100%;
            height: 158px;
            border: 0;
            border-radius: 6px;
        }

        .title {
            font-weight: bold;
            margin-top: 8px;
        }
    </style>
</head>

<body>
    <h1>Video Gallery</h1>
    <p>Open this page to view the videos with actual embedded players.</p>
    <div class="grid">
        <div class="card">
            <iframe src="https://www.youtube.com/embed/owJE9MXFDjo" title="Some demos of our instruments"
                allowfullscreen></iframe>
            <div class="title">Some demos of our instruments</div>
        </div>
        <div class="card">
            <iframe src="https://www.youtube.com/embed/v4bi33nPPbk" title="Headbower presentation"
                allowfullscreen></iframe>
            <div class="title">Headbower presentation</div>
        </div>
        <div class="card">
            <iframe src="https://www.youtube.com/embed/CEBNtHgaiqI" title="Resin presentation" allowfullscreen></iframe>
            <div class="title">Resin presentation</div>
        </div>
        <div class="card">
            <iframe src="https://www.youtube.com/embed/fB-MRQ6_yR4" title="Resin demo and explanation"
                allowfullscreen></iframe>
            <div class="title">Resin demo and explanation</div>
        </div>
        <div class="card">
            <iframe src="https://www.youtube.com/embed/Jf-_LkFmhbQ" title="Netytar demo" allowfullscreen></iframe>
            <div class="title">Netytar demo</div>
        </div>
        <div class="card">
            <iframe src="https://www.youtube.com/embed/D18603o46ho" title="Netychords demo" allowfullscreen></iframe>
            <div class="title">Netychords demo</div>
        </div>
        <div class="card">
            <iframe src="https://www.youtube.com/embed/-bs08Ohdr7w" title="DJeye demo" allowfullscreen></iframe>
            <div class="title">DJeye demo</div>
        </div>
    </div>
</body>

</html>
